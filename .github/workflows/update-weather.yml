name: Update Weather Forecast

on:
  schedule:
    # Run twice daily at 6 AM and 6 PM UTC (early morning and afternoon US time)
    - cron: '0 6,18 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch weather data
        run: pnpm weather

      - name: Check for changes
        id: changes
        run: |
          # Force-add the gitignored file so git can track changes
          git add -f src/data/weather.generated.ts
          if git diff --cached --quiet src/data/weather.generated.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update weather forecast data"
          git push
